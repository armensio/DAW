<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="titulo">Nuevo Producto</ui:define>

    <ui:define name="contenido">
        <div style="max-width:600px; margin: 0 auto;">
            <h2><i class="fa-solid fa-box-open me-2"></i>Nuevo Producto</h2>
            <hr/>

            <h:form enctype="multipart/form-data">

                <div class="mb-3">
                    <h:outputLabel for="nombre" value="Nombre del producto" styleClass="form-label"/>
                    <h:inputText id="nombre" styleClass="form-control"
                                 placeholder="Ej: Lentejas" required="true"/>
                </div>

                <div class="mb-3">
                    <h:outputLabel for="descripcion" value="Descripción" styleClass="form-label"/>
                    <h:inputTextarea id="descripcion" styleClass="form-control" rows="3"
                                     placeholder="Describe el producto..."/>
                </div>

                <div class="mb-3">
                    <h:outputLabel for="precio" value="Precio (€)" styleClass="form-label"/>
                    <div class="input-group">
                        <span class="input-group-text">€</span>
                        <h:inputText id="precio" styleClass="form-control"
                                     placeholder="0.00" required="true"/>
                    </div>
                </div>

                <div class="mb-3">
                    <h:outputLabel for="stock" value="Stock disponible" styleClass="form-label"/>
                    <h:inputText id="stock" styleClass="form-control"
                                 placeholder="0" required="true"/>
                </div>

                <div class="mb-3">
                    <h:outputLabel for="imagen" value="Imagen del producto" styleClass="form-label"/>
                    <h:inputFile id="imagen" styleClass="form-control" accept="image/*"/>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <h:commandButton value="Guardar producto"
                                     styleClass="btn btn-success"
                                     action="alta_producto.xhtml"/>
                    <a href="listado.xhtml" class="btn btn-secondary">
                        <i class="fa-solid fa-arrow-left me-1"></i> Cancelar
                    </a>
                </div>

            </h:form>
        </div>
    </ui:define>

</ui:composition>
