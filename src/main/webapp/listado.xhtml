<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="titulo">Listado de Productos</ui:define>

    <ui:define name="contenido">
        <h1>Listado de Productos</h1>

        <h:messages styleClass="alert alert-danger" errorClass="alert alert-danger"
                    infoClass="alert alert-success" showDetail="true"/>

        <h:form>
            <table class="table table-striped-columns">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Categoría</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <ui:repeat var="p" value="#{productoCtrl.productos}">
                        <tr>
                            <td>#{p.nombre}</td>
                            <td>#{p.precio} €</td>
                            <td>#{p.stock}</td>
                            <td>#{p.idCategoria}</td>
                            <td>
                                <!-- Botón Editar: navega a editar_producto.xhtml?id=X -->
                                <h:button value="Editar"
                                          styleClass="btn btn-sm btn-warning me-1"
                                          outcome="editar_producto">
                                    <f:param name="id" value="#{p.idProducto}"/>
                                </h:button>

                                <!-- Botón Borrar: llama al controlador con AJAX -->
                                <h:commandButton value="Borrar"
                                                 styleClass="btn btn-sm btn-danger"
                                                 action="#{productoCtrl.borra(p)}">
                                    <f:ajax render="@form"/>
                                </h:commandButton>
                            </td>
                        </tr>
                    </ui:repeat>
                </tbody>
            </table>

            <p class="text-muted">Total: #{productoCtrl.productos.size()} productos</p>
        </h:form>

        <h:link value="Nuevo Producto" outcome="alta_producto"
                styleClass="btn btn-success mt-2">
            <i class="fa-solid fa-plus me-1"/>
        </h:link>

    </ui:define>

</ui:composition>
