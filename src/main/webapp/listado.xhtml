<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                template="/WEB-INF/templates/layout.xhtml">

    <!-- 🔐 PROTECCIÓN AQUÍ -->
    <f:metadata>
        <f:viewAction action="#{loginCtrl.comprobarLogin}" />
    </f:metadata>

    <ui:define name="titulo">Listado de Productos</ui:define>

    <ui:define name="contenido">
        <h1>Listado de Productos</h1>

        <h:messages styleClass="alert alert-danger"
                    errorClass="alert alert-danger"
                    infoClass="alert alert-success"
                    showDetail="true"/>

        <h:form>
            <h:dataTable value="#{productoCtrl.productos}" var="p"
                         styleClass="table table-striped-columns">

                <h:column>
                    <f:facet name="header">Nombre</f:facet>
                    #{p.nombre}
                </h:column>

                <h:column>
                    <f:facet name="header">Precio</f:facet>
                    #{p.precio} €
                </h:column>

                <h:column>
                    <f:facet name="header">Stock</f:facet>
                    #{p.stock}
                </h:column>

                <h:column>
                    <f:facet name="header">Categoría</f:facet>
                    #{p.idCategoria}
                </h:column>

                <h:column>
                    <f:facet name="header">Acciones</f:facet>

                    <!-- 🛒 Añadir -->
                    <h:commandButton value="Añadir"
                                     styleClass="btn btn-sm btn-primary me-1"
                                     action="#{pedidoCtrl.addProducto}">

                        <f:setPropertyActionListener target="#{pedidoCtrl.productoSeleccionado}" value="#{p}"/>

                    </h:commandButton>

                    <!-- 🗑 Borrar -->
                    <h:commandButton value="Borrar"
                                     rendered="#{prefs.rol eq 'admin'}"
                                     action="#{productoCtrl.borra(p)}"
                                     styleClass="btn btn-sm btn-danger"/>

                </h:column>

            </h:dataTable>

            <p class="text-muted">
                Total: #{productoCtrl.productos.size()} productos
            </p>
        </h:form>

        <h:link value="Nuevo Producto"
                outcome="alta_producto"
                styleClass="btn btn-success mt-2">
            <i class="fa-solid fa-plus me-1"/>
        </h:link>

    </ui:define>

</ui:composition>
