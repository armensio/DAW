<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                template="/WEB-INF/templates/layout.xhtml">
    <f:metadata>
        <f:viewAction action="#{loginCtrl.comprobarAdmin}" />
    </f:metadata>

    <ui:define name="titulo">Nuevo Producto</ui:define>

    <ui:define name="contenido">
        <h:button value="⬅ Volver"
                  outcome="menu"
                  styleClass="btn btn-outline-secondary mb-3"/>
        <div style="max-width:600px; margin: 0 auto;">

            <h2><i class="fa-solid fa-box-open me-2"/>Nuevo Producto</h2>
            <hr/>

            <!-- Mensajes de error de validación -->
            <h:messages styleClass="alert alert-danger" showDetail="true"/>

            <h:form>

                <!-- Nombre -->
                <div class="mb-3">
                    <h:outputLabel for="nombre" value="Nombre del producto"
                                   styleClass="form-label"/>
                    <h:inputText id="nombre"
                                 value="#{productoCtrl.producto.nombre}"
                                 styleClass="form-control"
                                 placeholder="Ej: Lentejas"
                                 required="true"
                                 requiredMessage="El nombre es obligatorio"/>
                    <h:message for="nombre" styleClass="text-danger small"/>
                </div>

                <!-- Precio -->
                <div class="mb-3">
                    <h:outputLabel for="precio" value="Precio (€)"
                                   styleClass="form-label"/>
                    <div class="input-group">
                        <span class="input-group-text">€</span>
                        <h:inputText id="precio"
                                     value="#{productoCtrl.producto.precio}"
                                     styleClass="form-control"
                                     placeholder="0.00"
                                     required="true"
                                     requiredMessage="El precio es obligatorio"
                                     converterMessage="Introduce un número válido, p.ej: 1.99">
                            <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                            <f:validateLongRange minimum="0"/>
                        </h:inputText>
                    </div>
                    <h:message for="precio" styleClass="text-danger small"/>
                </div>

                <!-- Stock -->
                <div class="mb-3">
                    <h:outputLabel for="stock" value="Stock disponible"
                                   styleClass="form-label"/>
                    <h:inputText id="stock"
                                 value="#{productoCtrl.producto.stock}"
                                 styleClass="form-control"
                                 placeholder="0"
                                 required="true"
                                 requiredMessage="El stock es obligatorio"
                                 converterMessage="El stock debe ser un número entero">
                        <f:validateLongRange minimum="1"/>
                    </h:inputText>
                    <h:message for="stock" styleClass="text-danger small"/>
                </div>

                <!-- Categoría -->
                <div class="mb-3">
                    <h:outputLabel for="categoria" value="Categoría"
                                   styleClass="form-label"/>
                    <h:selectOneMenu id="categoria"
                                     value="#{productoCtrl.producto.idCategoria}"
                                     styleClass="form-select"
                                     required="true"
                                     requiredMessage="Selecciona una categoría">
                        <f:selectItem itemValue="0" itemLabel="-- Selecciona una categoría --"/>
                        <f:selectItems value="#{productoCtrl.categorias}"
                                       var="cat"
                                       itemValue="#{cat.idCategoria}"
                                       itemLabel="#{cat.nombre}"/>
                    </h:selectOneMenu>
                    <h:message for="categoria" styleClass="text-danger small"/>
                </div>

                <!-- Botones -->
                <div class="d-flex gap-2 mt-4">
                    <h:commandButton value="Guardar producto"
                                     styleClass="btn btn-success"
                                     action="#{productoCtrl.crea()}"/>

                    <h:button value="Cancelar"
                              styleClass="btn btn-secondary"
                              outcome="menu"/>
                </div>

            </h:form>
        </div>
    </ui:define>

</ui:composition>
