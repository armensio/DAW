<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                template="/WEB-INF/templates/layout.xhtml">

    <ui:define name="titulo">Editar Producto</ui:define>

    <ui:define name="contenido">

        <!-- Recupera el producto a editar a partir del parámetro ?id=X de la URL -->
        <f:metadata>
            <f:viewParam name="id"
                         value="#{productoCtrl.producto.idProducto}"
                         required="true"
                         requiredMessage="Debes indicar el ID del producto a editar"/>
            <f:viewAction action="#{productoCtrl.recupera()}"/>
        </f:metadata>

        <div style="max-width:600px; margin: 0 auto;">
            <h2><i class="fa-solid fa-pen-to-square me-2"/>Editar Producto</h2>
            <hr/>

            <h:messages styleClass="alert alert-danger" showDetail="true"/>

            <h:form>

                <!-- ID: solo lectura, no editable -->
                <div class="mb-3">
                    <label class="form-label fw-bold">ID del producto</label>
                    <p class="form-control-plaintext">#{productoCtrl.producto.idProducto}</p>
                    <!-- Campo oculto para que el ID viaje en el POST y guarda() lo encuentre -->
                    <h:inputHidden value="#{productoCtrl.producto.idProducto}"/>
                </div>

                <!-- Nombre -->
                <div class="mb-3">
                    <h:outputLabel for="nombre" value="Nombre del producto"
                                   styleClass="form-label"/>
                    <h:inputText id="nombre"
                                 value="#{productoCtrl.producto.nombre}"
                                 styleClass="form-control"
                                 required="true"
                                 requiredMessage="El nombre es obligatorio"/>
                    <h:message for="nombre" styleClass="text-danger small"/>
                </div>

                <!-- Precio -->
                <div class="mb-3">
                    <h:outputLabel for="precio" value="Precio (€)"
                                   styleClass="form-label"/>
                    <div class="input-group">
                        <span class="input-group-text">€</span>
                        <h:inputText id="precio"
                                     value="#{productoCtrl.producto.precio}"
                                     styleClass="form-control"
                                     required="true"
                                     requiredMessage="El precio es obligatorio"
                                     converterMessage="Introduce un número válido, p.ej: 1.99">
                            <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                        </h:inputText>
                    </div>
                    <h:message for="precio" styleClass="text-danger small"/>
                </div>

                <!-- Stock -->
                <div class="mb-3">
                    <h:outputLabel for="stock" value="Stock disponible"
                                   styleClass="form-label"/>
                    <h:inputText id="stock"
                                 value="#{productoCtrl.producto.stock}"
                                 styleClass="form-control"
                                 required="true"
                                 requiredMessage="El stock es obligatorio"
                                 converterMessage="El stock debe ser un número entero">
                        <f:validateLongRange minimum="0"/>
                    </h:inputText>
                    <h:message for="stock" styleClass="text-danger small"/>
                </div>

                <!-- Categoría -->
                <div class="mb-3">
                    <h:outputLabel for="categoria" value="Categoría"
                                   styleClass="form-label"/>
                    <h:selectOneMenu id="categoria"
                                     value="#{productoCtrl.producto.idCategoria}"
                                     styleClass="form-select"
                                     required="true"
                                     requiredMessage="Selecciona una categoría">
                        <f:selectItems value="#{productoCtrl.categorias}"
                                       var="cat"
                                       itemValue="#{cat.idCategoria}"
                                       itemLabel="#{cat.nombre}"/>
                    </h:selectOneMenu>
                    <h:message for="categoria" styleClass="text-danger small"/>
                </div>

                <!-- Botones -->
                <div class="d-flex gap-2 mt-4">
                    <h:commandButton value="Guardar cambios"
                                     styleClass="btn btn-success"
                                     action="#{productoCtrl.guarda()}"/>
                    <h:commandButton value="Cancelar"
                                     styleClass="btn btn-secondary"
                                     action="listado?faces-redirect=true"
                                     immediate="true">
                        <i class="fa-solid fa-arrow-left me-1"/>
                    </h:commandButton>
                </div>

            </h:form>
        </div>
    </ui:define>

</ui:composition>
