<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      lang="es">

<h:head>
    <meta charset="UTF-8"/>
    <title><ui:insert name="titulo">DAW_Market</ui:insert></title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</h:head>

<h:body>

    <nav class="navbar navbar-dark bg-dark px-3">

        <!-- LOGO -->
        <span class="navbar-brand">DAW_Market</span>

        <!-- BUSCADOR -->
        <div class="d-flex mx-auto">
            <input class="form-control me-2" type="search" placeholder="Buscar..."/>
            <button class="btn btn-outline-light" type="button">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>

        <!-- MENU DERECHA -->
        <div class="d-flex align-items-center gap-3">

            <!-- ICONOS -->
            <h:link outcome="menu" styleClass="text-white fs-4">
                <i class="fa-solid fa-house"></i>
            </h:link>

            <h:link outcome="perfil" styleClass="text-white fs-4">
                <i class="fa-solid fa-user"></i>
            </h:link>

            <h:link outcome="carro" styleClass="text-white fs-4">
                <i class="fa-solid fa-cart-shopping"></i>
            </h:link>

            <!-- USUARIO + LOGOUT -->
            <h:panelGroup rendered="#{prefs.logueado}">
                <h:form class="d-flex align-items-center gap-2">

                    <h:outputText value="#{prefs.usuario}"
                                  styleClass="text-white fw-bold"/>

                    <h:commandButton value="Salir"
                                     action="#{loginCtrl.logout}"
                                     styleClass="btn btn-danger btn-sm"/>

                </h:form>
            </h:panelGroup>

        </div>
    </nav>

    <div class="container mt-3">
        <ui:insert name="contenido"/>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"></script>

</h:body>
</html>
