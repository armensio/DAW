<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
          integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"
          integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand">DAW_Market</span>
    <form class="d-flex mx-auto" role="search">
        <input class="form-control me-2" type="search" placeholder="Buscar..." aria-label="Buscar">
        <button class="btn btn-outline-light" type="submit">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </form>
    <div class="d-flex gap-3">
        <a href="perfil.html" class="text-white fs-4">
            <i class="fa-solid fa-user"></i>
        </a>
        <a href="carro.html" class="text-white fs-4">
            <i class="fa-solid fa-cart-shopping"></i>
        </a>
    </div>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <h2><i class="fa-solid fa-box-open me-2"></i>Nuevo Producto</h2>
    <hr>
    <form action="#" method="post" enctype="multipart/form-data">

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre del producto</label>
            <input type="text" class="form-control" id="nombre" name="nombre"
                   placeholder="Ej: Lentejas" required>
        </div>

        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea class="form-control" id="descripcion" name="descripcion"
                      rows="3" placeholder="Describe el producto..."></textarea>
        </div>

        <div class="mb-3">
            <label for="precio" class="form-label">Precio (€)</label>
            <div class="input-group">
                <span class="input-group-text">€</span>
                <input type="number" class="form-control" id="precio" name="precio"
                       placeholder="0.00" min="0" step="0.01" required>
            </div>
        </div>

        <div class="mb-3">
            <label for="stock" class="form-label">Stock disponible</label>
            <input type="number" class="form-control" id="stock" name="stock"
                   placeholder="0" min="0" required>
        </div>

        <div class="mb-3">
            <label for="imagen" class="form-label">Imagen del producto</label>
            <input type="file" class="form-control" id="imagen" name="imagen"
                   accept="image/*">
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-success">
                <i class="fa-solid fa-floppy-disk me-1"></i> Guardar producto
            </button>
            <a href="listado.html" class="btn btn-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i> Cancelar
            </a>
        </div>

    </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"
        integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="
        crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
</body>
</html>
